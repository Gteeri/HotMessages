# ===========================================================
#  HotMessages — конфигурация
# ===========================================================

enabled: true

storage:
  # Файл, в котором хранятся активные муты чата (переживают перезапуск сервера)
  mutes-file: mutes.yml

# ===========================================================
#  Фильтр запрещённых слов
# ===========================================================
filter:
  enabled: true
  # CENSOR — заменяет запрещённые слова символом цензуры прямо в сообщении
  # BLOCK  — полностью отменяет сообщение
  mode: CENSOR
  censor-symbol: "*"
  # Право, при наличии которого игрок полностью пропускает фильтр и антиспам
  bypass-permission: hotmessages.bypass

# ===========================================================
#  Предупреждения и муты
# ===========================================================
warnings:
  enabled: true
  # Сколько нарушений фильтра подряд приводит к автоматическому муту
  warnings-before-mute: 3
  # Через сколько минут неактивности счётчик предупреждений сбрасывается
  warning-reset-after-minutes: 30
  # Длительность мута при первом достижении лимита предупреждений (минуты)
  mute-duration-minutes: 5
  # Если true — каждый следующий автомут для того же игрока в 2 раза длиннее предыдущего
  escalate-mute: true
  # Верхний предел длительности автомута, даже с учётом эскалации (минуты)
  max-mute-duration-minutes: 120

# ===========================================================
#  Антиспам / антифлуд
#  Пороги специально подобраны так, чтобы не мешать обычным игрокам —
#  большинство защит смягчают сообщение, а не блокируют его целиком.
# ===========================================================
anti-spam:
  enabled: true
  # Минимальная задержка между сообщениями одного игрока, в миллисекундах
  message-cooldown-ms: 1200
  # Сколько раз подряд можно повторить одно и то же сообщение, прежде чем оно будет заблокировано
  duplicate-limit: 3
  # Окно времени (сек), в течение которого считаются повторы
  duplicate-window-seconds: 30

  caps:
    enabled: true
    # Проверка КАПСА применяется только к сообщениям от этой длины (символов)
    min-length: 8
    # Если доля заглавных букв выше — сообщение автоматически приводится к нижнему регистру
    max-percentage: 70

  flood-chars:
    enabled: true
    # Сколько подряд идущих одинаковых символов допустимо, прежде чем лишние схлопываются
    # (не блокирует сообщение — просто аккуратно подрезает растянутые слова)
    max-repeats: 3

# ===========================================================
#  Производительность
# ===========================================================
performance:
  # Как часто (сек) очищать память от неактивных антиспам-записей игроков
  cleanup-interval-seconds: 300
  # Забывать состояние офлайн-игрока спустя столько минут
  forget-after-minutes: 15
